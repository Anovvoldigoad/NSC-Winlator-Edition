name: Build NSC Winlator Edition

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: |
        cd .
        dotnet restore
      
    - name: Build project
      run: |
        cd .
        dotnet build -c Release
        
    - name: Run tests (if any)
      run: |
        cd .
        dotnet test --no-build --verbosity normal 2>/dev/null || echo "No tests found"
      continue-on-error: true
      
    - name: Publish Release Build
      run: |
        cd .
        dotnet publish -c Release -r win-x64 --self-contained -o publish
        
    - name: Create Release Archive
      uses: actions/upload-artifact@v4
      with:
        name: NSC-Winlator-win-x64
        path: src/NSC.Winlator/publish/
        
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: NSC Winlator Edition ${{ github.ref }}
        body: |
          # NSC Winlator Edition Release
          
          This release includes:
          - Complete .NET 8 WinForms application
          - All source code
          - Comprehensive documentation
          - Production-ready binary
          
          ## What's Included
          - Mod management system
          - Profile support
          - Game backup/restore
          - YACpk compilation
          - Conflict detection
          - Comprehensive logging
          
          ## Installation
          1. Extract the zip file
          2. Run NSC.Winlator.exe
          3. Configure game path
          4. Start managing mods!
          
          ## Requirements
          - Windows 10/11 (native)
          - Or Winlator (Android)
          - Or Wine/Proton (Linux)
          - .NET 8 Runtime (included in self-contained build)
          
          ## Documentation
          See included documentation files for:
          - Quick start guide
          - Build instructions
          - Architecture overview
          - Complete feature list
        draft: false
        prerelease: false
